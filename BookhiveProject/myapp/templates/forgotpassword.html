<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BookHive | Forgot Password</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #2c3e50, #8e735b);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .forgot-container {
            width: 850px;
            display: flex;
            background: white;
            border-radius: 18px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.25);
        }

        .left-panel {
            flex: 1;
            background: #2c3e50;
            color: white;
            padding: 50px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .left-panel h1 {
            font-size: 38px;
            margin-bottom: 15px;
        }

        .left-panel p {
            font-size: 17px;
            line-height: 1.6;
            color: #e8e8e8;
        }

        .right-panel {
            flex: 1;
            padding: 50px;
        }

        .right-panel h2 {
            color: #2c3e50;
            margin-bottom: 25px;
        }

        label {
            font-weight: bold;
            color: #333;
        }

        input {
            width: 100%;
            padding: 13px;
            margin: 8px 0 18px;
            border: 1px solid #ccc;
            border-radius: 10px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 14px;
            background: #2c3e50;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background: #1f2d3a;
        }

        .links {
            margin-top: 20px;
            text-align: center;
        }

        .links a {
            color: #2c3e50;
            text-decoration: none;
            font-weight: bold;
        }

        .links a:hover {
            text-decoration: underline;
        }

        .message {
            color: red;
            margin-bottom: 12px;
            text-align: center;
        }

        .success {
            color: green;
        }
    </style>
</head>
<body>

<div class="forgot-container">
    <div class="left-panel">
        <h1>Reset Password</h1>
        <p>
            Enter your login ID and registered email to create a new password for your BookHive account.
        </p>
    </div>

    <div class="right-panel">
        <h2>Forgot Password</h2>

        {% if messages %}
            {% for message in messages %}
                <div class="message {% if message.tags == 'success' %}success{% endif %}">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <form method="POST">
            {% csrf_token %}

            <label>Login ID</label>
            <input type="text" name="loginid" placeholder="Enter your login ID" required>

            <label>Email</label>
            <input type="email" name="email" placeholder="Enter registered email" required>

            <label>New Password</label>
            <input type="password" name="new_password" placeholder="Enter new password" required>

            <label>Confirm Password</label>
            <input type="password" name="confirm_password" placeholder="Confirm new password" required>

            <button type="submit">Reset Password</button>
        </form>

        <div class="links">
            <p><a href="{% url 'UserLogin' %}">Back to Login</a></p>
        </div>
    </div>
</div>

</body>
</html>
