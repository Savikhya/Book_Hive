<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BookHive | User Login</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #2c3e50, #8e735b);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-container {
            width: 900px;
            display: flex;
            background: white;
            border-radius: 18px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.25);
        }

        .left-panel {
            flex: 1;
            background: #2c3e50;
            color: white;
            padding: 50px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .left-panel h1 {
            font-size: 42px;
            margin-bottom: 15px;
        }

        .left-panel p {
            font-size: 17px;
            line-height: 1.6;
            color: #e8e8e8;
        }

        .right-panel {
            flex: 1;
            padding: 50px;
        }

        .right-panel h2 {
            color: #2c3e50;
            margin-bottom: 25px;
        }

        label {
            font-weight: bold;
            color: #333;
        }

        input {
            width: 100%;
            padding: 13px;
            margin: 8px 0 18px;
            border: 1px solid #ccc;
            border-radius: 10px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 14px;
            background: #2c3e50;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background: #1f2d3a;
        }

        .links {
            margin-top: 20px;
            text-align: center;
        }

        .links a {
            color: #2c3e50;
            text-decoration: none;
            font-weight: bold;
        }

        .links a:hover {
            text-decoration: underline;
        }

        .message {
            color: red;
            margin-bottom: 12px;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="login-container">
    <div class="left-panel">
        <h1>BookHive</h1>
        <p>
            Discover, search, view, and download books from one simple digital library platform.
        </p>
    </div>

    <div class="right-panel">
        <h2>User Login</h2>

        {% if messages %}
            {% for message in messages %}
                <div class="message">{{ message }}</div>
            {% endfor %}
        {% endif %}

        <form method="POST">
            {% csrf_token %}

            <label>Login ID</label>
            <input type="text" name="loginid" placeholder="Enter your login ID" required>

            <label>Password</label>
            <input type="password" name="pswd" placeholder="Enter your password" required>

            <button type="submit">Login</button>
        </form>

        <div class="links">
            <p><a href="{% url 'UserRegister' %}">Create New Account</a></p>
            <p><a href="{% url 'ForgotPassword' %}">Forgot Password?</a></p>
            <p><a href="{% url 'AdminLogin' %}">Admin Login</a></p>
        </div>
    </div>
</div>

</body>
</html>
