<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ book.title }} | Bookhive</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f9;
            margin: 0;
            padding: 0;
        }
        .navbar {
            background-color: #2c3e50;
            color: white;
            padding: 15px 30px;
        }
        .navbar a {
            color: white;
            text-decoration: none;
            font-weight: bold;
        }
        .container {
            width: 80%;
            max-width: 800px;
            margin: 30px auto;
        }
        .card {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        h1 {
            margin-top: 0;
            color: #2c3e50;
        }
        p {
            line-height: 1.6;
        }
        .pdf-links a {
            margin-right: 15px;
            color: #3498db;
            font-weight: bold;
            text-decoration: none;
        }
        .pdf-links a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="navbar">
        <a href="{% url 'UserHome' %}">← Back to Home</a>
    </div>

    <div class="container">
        <div class="card">
            <h1>{{ book.title }}</h1>
            <p><strong>Author:</strong> {{ book.author }}</p>
            <p><strong>Genre:</strong> {{ book.genre.name }}</p>
            <p><strong>Description:</strong> {{ book.description }}</p>

            {% if book.book_pdf %}
                <p><strong>Book PDF:</strong> Available</p>
                <div class="pdf-links">
                    <a href="{{ book.book_pdf.url }}" target="_blank">View PDF</a>
                    <a href="{% url 'download_book_pdf' book.id %}">Download PDF</a>
                </div>
            {% else %}
                <p><strong>Book PDF:</strong> Not uploaded</p>
            {% endif %}
        </div>
    </div>
</body>
</html>
