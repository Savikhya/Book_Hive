<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BookHive | Admin Login</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #1f2d3a, #5d4037);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .admin-card {
            width: 430px;
            background: white;
            padding: 45px;
            border-radius: 18px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            text-align: center;
        }

        .admin-card h1 {
            color: #2c3e50;
            margin-bottom: 8px;
        }

        .admin-card p {
            color: #777;
            margin-bottom: 30px;
        }

        label {
            display: block;
            text-align: left;
            font-weight: bold;
            margin-bottom: 6px;
            color: #333;
        }

        input {
            width: 100%;
            padding: 13px;
            margin-bottom: 18px;
            border-radius: 10px;
            border: 1px solid #ccc;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 14px;
            background: #5d4037;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background: #3e2723;
        }

        .links {
            margin-top: 20px;
        }

        .links a {
            color: #2c3e50;
            text-decoration: none;
            font-weight: bold;
        }

        .message {
            color: red;
            margin-bottom: 12px;
        }
    </style>
</head>
<body>

<div class="admin-card">
    <h1>BookHive Admin</h1>
    <p>Manage books, genres, PDFs, and cover images</p>

    {% if messages %}
        {% for message in messages %}
            <div class="message">{{ message }}</div>
        {% endfor %}
    {% endif %}

    <form method="POST">
        {% csrf_token %}

        <label>Admin Username</label>
        <input type="text" name="loginid" placeholder="Enter admin username" required>

        <label>Password</label>
        <input type="password" name="pswd" placeholder="Enter password" required>

        <button type="submit">Login as Admin</button>
    </form>

    <div class="links">
        <a href="{% url 'UserLogin' %}">Back to User Login</a>
    </div>
</div>

</body>
</html>
