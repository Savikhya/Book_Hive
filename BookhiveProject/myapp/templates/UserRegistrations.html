<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BookHive | Create Account</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #2c3e50, #8e735b);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 30px 0;
        }

        .register-container {
            width: 900px;
            display: flex;
            background: white;
            border-radius: 18px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.25);
        }

        .left-panel {
            flex: 1;
            background: #2c3e50;
            color: white;
            padding: 50px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .left-panel h1 {
            font-size: 40px;
            margin-bottom: 15px;
        }

        .left-panel p {
            font-size: 17px;
            line-height: 1.6;
            color: #e8e8e8;
        }

        .right-panel {
            flex: 1.2;
            padding: 40px;
        }

        .right-panel h2 {
            color: #2c3e50;
            margin-bottom: 20px;
        }

        label {
            font-weight: bold;
            color: #333;
        }

        input, textarea {
            width: 100%;
            padding: 12px;
            margin: 6px 0 14px;
            border: 1px solid #ccc;
            border-radius: 10px;
            box-sizing: border-box;
        }

        textarea {
            resize: vertical;
            height: 70px;
        }

        button {
            width: 100%;
            padding: 14px;
            background: #2c3e50;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background: #1f2d3a;
        }

        .links {
            margin-top: 18px;
            text-align: center;
        }

        .links a {
            color: #2c3e50;
            text-decoration: none;
            font-weight: bold;
        }

        .links a:hover {
            text-decoration: underline;
        }

        .message {
            color: red;
            margin-bottom: 12px;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="register-container">
    <div class="left-panel">
        <h1>Join BookHive</h1>
        <p>
            Create your account and start exploring books, viewing details, and downloading available books.
        </p>
    </div>

    <div class="right-panel">
        <h2>Create Account</h2>

        {% if messages %}
            {% for message in messages %}
                <div class="message">{{ message }}</div>
            {% endfor %}
        {% endif %}

        <form method="POST">
            {% csrf_token %}

            <label>Name</label>
            <input type="text" name="name" placeholder="Enter your full name" required>

            <label>Login ID</label>
            <input type="text" name="loginid" placeholder="Choose a login ID" required>

            <label>Password</label>
            <input type="password" name="password" placeholder="Create password" required>

            <label>Mobile</label>
            <input type="text" name="mobile" placeholder="Enter mobile number" required>

            <label>Email</label>
            <input type="email" name="email" placeholder="Enter email address" required>

            <label>Locality</label>
            <input type="text" name="locality" placeholder="Enter locality">

            <label>Address</label>
            <textarea name="address" placeholder="Enter address"></textarea>

            <label>City</label>
            <input type="text" name="city" placeholder="Enter city">

            <label>State</label>
            <input type="text" name="state" placeholder="Enter state">

            <button type="submit">Create Account</button>
        </form>

        <div class="links">
            <p>Already have an account? <a href="{% url 'UserLogin' %}">Login Here</a></p>
        </div>
    </div>
</div>

</body>
</html>
