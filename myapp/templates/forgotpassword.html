{% extends 'base.html' %}
{% block contents %}

<style>
    body {
        margin: 0;
        padding: 0;
        background: white;
        font-family: 'Segoe UI', sans-serif;
    }

    .container {
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 40px 20px;
    }

    .card {
        width: 380px;
        background: white;
        border: 1px solid #eeeeee;
        border-radius: 18px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.08);
        padding: 35px;
    }

    .card h2 {
        text-align: center;
        margin-bottom: 25px;
        color: #333;
    }

    .card input {
        width: 100%;
        padding: 13px 14px;
        margin-bottom: 14px;
        border-radius: 10px;
        border: 1px solid #dcdcdc;
        font-size: 15px;
        box-sizing: border-box;
        outline: none;
    }

    .card input:focus {
        border-color: #667eea;
    }

    .btn {
        width: 100%;
        padding: 13px;
        border: none;
        border-radius: 10px;
        background: #667eea;
        color: white;
        font-size: 16px;
        cursor: pointer;
    }

    .btn:hover {
        background: #5a67d8;
    }

    .links {
        margin-top: 18px;
        text-align: center;
    }

    .links a {
        text-decoration: none;
        color: #667eea;
        font-size: 14px;
        font-weight: 500;
    }

    .links a:hover {
        text-decoration: underline;
    }

    .message {
        margin-top: 15px;
        text-align: center;
    }

    .message p {
        margin: 6px 0;
        color: #d11a2a;
    }
</style>

<div class="container">
    <div class="card">
        <h2>Forgot Password</h2>

        <form action="{% url 'ForgotPassword' %}" method="post">
            {% csrf_token %}

            <input type="text" name="loginid" placeholder="Login ID" required>
            <input type="email" name="email" placeholder="Registered Email" required>
            <input type="password" name="new_password" placeholder="New Password" required>
            <input type="password" name="confirm_password" placeholder="Confirm New Password" required>

            <button type="submit" class="btn">Reset Password</button>
        </form>

        <div class="links">
            <a href="{% url 'UserLogin' %}">Back to Login</a>
        </div>

        <div class="message">
            {% if messages %}
                {% for message in messages %}
                    <p>{{ message }}</p>
                {% endfor %}
            {% endif %}
        </div>
    </div>
</div>

{% endblock %}
