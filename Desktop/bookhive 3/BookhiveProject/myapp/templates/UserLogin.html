{% extends 'base.html' %}
{% block contents %}

<style>
    body {
        margin: 0;
        padding: 0;
        background: linear-gradient(135deg, #667eea, #764ba2);
        font-family: 'Segoe UI', sans-serif;
    }

    .container {
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
    }

    .login-card {
        background: white;
        padding: 40px;
        border-radius: 18px;
        width: 360px;
        box-shadow: 0 12px 30px rgba(0,0,0,0.2);
        text-align: center;
    }

    .login-card h2 {
        margin-bottom: 25px;
        color: #333;
        font-size: 26px;
    }

    .login-card input {
        width: 100%;
        padding: 13px;
        margin-bottom: 15px;
        border-radius: 10px;
        border: 1px solid #ccc;
        font-size: 15px;
        outline: none;
        box-sizing: border-box;
    }

    .login-card input:focus {
        border-color: #667eea;
    }

    .btn {
        width: 100%;
        padding: 13px;
        border: none;
        border-radius: 10px;
        background: #667eea;
        color: white;
        font-size: 16px;
        cursor: pointer;
        transition: 0.3s;
    }

    .btn:hover {
        background: #5a67d8;
    }

    .links {
        margin-top: 18px;
    }

    .links a {
        display: block;
        text-decoration: none;
        color: #667eea;
        font-size: 14px;
        margin: 6px 0;
        font-weight: 500;
    }

    .links a:hover {
        text-decoration: underline;
    }

    .admin-link {
        margin-top: 15px;
        padding-top: 15px;
        border-top: 1px solid #eeeeee;
    }

    .admin-link a {
        color: #111827;
        font-weight: 600;
    }

    .message {
        margin-top: 15px;
    }

    .message p {
        margin: 5px 0;
        color: red;
        font-size: 14px;
    }
</style>

<div class="container">
    <div class="login-card">
        <h2>Login to Bookhive</h2>

        <form action="{% url 'UserLogin' %}" method="post">
            {% csrf_token %}
            <input type="text" name="loginid" placeholder="Login ID" required>
            <input type="password" name="pswd" placeholder="Password" required>
            <button type="submit" class="btn">Login</button>
        </form>

        <div class="links">
            <a href="{% url 'UserRegister' %}">Create Account</a>
            <a href="{% url 'ForgotPassword' %}">Forgot Password?</a>
        </div>

        <div class="admin-link">
            <a href="{% url 'AdminLogin' %}">Admin Login</a>
        </div>

        <div class="message">
            {% if messages %}
                {% for message in messages %}
                    <p>{{ message }}</p>
                {% endfor %}
            {% endif %}
        </div>
    </div>
</div>

{% endblock %}
